tips:
  prefix: "[<dark_aqua>Consejo</dark_aqua>] "
  tip-1:
    title: "<aqua>¡Únete a nuestro Discord!</aqua>"
    content-1: "<click:open_url:'https://discord.gg/JygVAym6by'><u>https://discord.gg/JygVAym6by</u></click>"
  tip-2:
    title: "<aqua>Sobre el Nivel de Culpa...</aqua>"
    content-1: "Matar jugadores o minar el núcleo aumentará tu nivel de culpa."
    content-2: "A mayor nivel de culpa, más tardarás en reaparecer."
  tip-3:
    title: "<aqua>Sobre el Sistema de Niveles...</aqua>"
    content-1: "Avanzar de fase, minar, matar y atacar el núcleo otorga EXP."
    content-2: "Al subir de nivel, desbloquearás más clases."
  tip-4:
    title: "<aqua>Sobre el Robo...</aqua>"
    content-1: "No puedes abrir los cofres que están demasiado cerca de la base enemiga."
    content-2: "Llevar una mesa de encantamientos o un cofre de Ender te dará Lentitud X."
  tip-5:
    title: "<aqua>Sobre los Asesinatos...</aqua>"
    content-1: "Al matar, recibirás debilidad, ceguera y lentitud por poco tiempo."
    content-2: "Matar a 10 personas seguidas te convierte en el Capitán Asesino; quien te mate ganará 10 esmeraldas."
  tip-6:
    title: "<aqua>Sobre el Núcleo...</aqua>"
    content-1: "La energía del núcleo absorbe agua/lava cercana y destruye la obsidiana."
    content-2: "Minar el núcleo te dará fatiga al minar y el efecto de brillo brevemente."
  tip-7:
    title: "<aqua>Sobre los Minerales...</aqua>"
    content-1: "El equilibrio de recursos es vital para ganar."
    content-2: "El oro y las esmeraldas son moneda. ¡No olvides el lapislázuli para encantar!"
  tip-8:
    title: "<aqua>Sobre Perder Objetos...</aqua>"
    content-1: "Al morir, hay un 10% de probabilidad de soltar cada objeto."
    content-2: "Las mesas de encantamientos y cofres de Ender siempre caen al morir."
  tip-9:
    title: "<aqua>Sobre la Invisibilidad...</aqua>"
    content-1: "La invisibilidad se cancela si recibes más de 1 corazón de daño."
  tip-10:
    title: "<aqua>Sobre la Lotería...</aqua>"
    content-1: "La tienda vende núcleos de lotería para obtener equipo especial."
    content-2: "También puede dar efectos negativos, ¡así que ten cuidado!"
    content-3: "Tras ganar el premio mayor (oro), tu probabilidad de ganarlo de nuevo disminuye."
  tip-11:
    title: "<aqua>Sobre los Hornos...</aqua>"
    content-1: "Los hornos son 5 veces más rápidos y dan más experiencia."
    content-2: "Además de oro/hierro, la tienda vende comida cruda para cocinar."
  tip-12:
    title: "<aqua>Sobre los Cultivos...</aqua>"
    content-1: "Los cultivos no crecen solos; alguien debe agacharse cerca de ellos."
    content-2: "Haz clic derecho con la mano vacía o una azada para cosechar minerales."

